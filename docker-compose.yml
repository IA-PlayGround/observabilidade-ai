version: "3.9"

services:
  # ── Messaging & Cache ──────────────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    healthcheck:
      test: echo srvr | nc localhost 2181 || exit 1
      interval: 10s
      retries: 5

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: kafka-broker-api-versions --bootstrap-server localhost:9092
      interval: 15s
      retries: 5

  redis:
    image: redis:7.2-alpine
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      retries: 5

  # ── Observability Stack ────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.53.0
    ports:
      - "9090:9090"
    volumes:
      - ./infrastructure/docker/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=30d
      - --web.enable-remote-write-receiver
      - --enable-feature=otlp-write-receiver
    healthcheck:
      test: ["CMD", "wget", "-q", "http://localhost:9090/-/healthy"]
      interval: 10s
      retries: 5

  tempo:
    image: grafana/tempo:2.5.0
    ports:
      - "3200:3200"
      - "9095:9095"
    volumes:
      - ./infrastructure/docker/tempo.yaml:/etc/tempo/tempo.yaml
      - tempo_data:/var/tempo
    command: -config.file=/etc/tempo/tempo.yaml
    healthcheck:
      test: ["CMD", "wget", "-q", "http://localhost:3200/ready"]
      interval: 10s
      retries: 5

  loki:
    image: grafana/loki:3.1.0
    ports:
      - "3100:3100"
    volumes:
      - ./infrastructure/docker/loki.yaml:/etc/loki/local-config.yaml
      - loki_data:/loki
    command: -config.file=/etc/loki/local-config.yaml
    healthcheck:
      test: ["CMD", "wget", "-q", "http://localhost:3100/ready"]
      interval: 10s
      retries: 5

  grafana:
    image: grafana/grafana:11.0.0
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: spectrum
      GF_INSTALL_PLUGINS: ""
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Editor
      GF_FEATURE_TOGGLES_ENABLE: traceToMetrics traceToLogs correlations
    volumes:
      - grafana_data:/var/lib/grafana
      - ./infrastructure/docker/grafana/datasources:/etc/grafana/provisioning/datasources
      - ./infrastructure/docker/grafana/dashboards:/etc/grafana/provisioning/dashboards
    healthcheck:
      test: ["CMD", "wget", "-q", "http://localhost:3000/api/health"]
      interval: 15s
      retries: 5
    depends_on:
      - prometheus
      - tempo
      - loki

  # ── OpenTelemetry Collector ────────────────────────────────
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.105.0
    ports:
      - "4317:4317"
      - "4318:4318"
      - "8888:8888"
      - "8889:8889"
    volumes:
      - ./infrastructure/docker/otel-collector-config.yaml:/etc/otel-collector-config.yaml
    command: --config /etc/otel-collector-config.yaml
    depends_on:
      kafka:
        condition: service_healthy
      prometheus:
        condition: service_healthy

  # ── Spectrum Services ──────────────────────────────────────
  correlation-engine:
    build:
      context: ./services/correlation-engine
      dockerfile: Dockerfile
    ports:
      - "8081:8081"
    environment:
      KAFKA_BROKERS: kafka:9092
      REDIS_ADDR: redis:6379
      CORRELATION_PORT: "8081"
      CORRELATION_WINDOW_SECONDS: "120"
      PROMETHEUS_URL: http://prometheus:9090
      TEMPO_URL: http://tempo:3200
      LOKI_URL: http://loki:3100
      LOG_LEVEL: debug
    depends_on:
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy

  ai-engine:
    build:
      context: ./services/ai-engine
      dockerfile: Dockerfile
    ports:
      - "8082:8082"
    environment:
      LLM_BACKEND: ${LLM_BACKEND:-openai}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      CORRELATION_URL: http://correlation-engine:8081
      PROMETHEUS_URL: http://prometheus:9090
      TEMPO_URL: http://tempo:3200
      LOKI_URL: http://loki:3100
      AI_ENGINE_PORT: "8082"
      LLM_TIMEOUT: "30s"
      LOG_LEVEL: debug
    depends_on:
      - correlation-engine

  api-gateway:
    build:
      context: ./services/api-gateway
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      API_GATEWAY_PORT: "8080"
      CORRELATION_URL: http://correlation-engine:8081
      AI_ENGINE_URL: http://ai-engine:8082
      GRAFANA_URL: http://grafana:3000
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-me}
      CORS_ALLOWED_ORIGINS: http://localhost:3000,http://localhost:5173
      LOG_LEVEL: debug
    depends_on:
      - correlation-engine
      - ai-engine
      - grafana

  # ── Admin UI ───────────────────────────────────────────────
  admin-ui:
    build:
      context: ./web/admin-ui
      dockerfile: Dockerfile
    ports:
      - "5173:80"
    depends_on:
      - api-gateway

volumes:
  prometheus_data:
  tempo_data:
  loki_data:
  grafana_data:
