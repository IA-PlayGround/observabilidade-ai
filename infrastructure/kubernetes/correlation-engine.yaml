apiVersion: apps/v1
kind: Deployment
metadata:
  name: correlation-engine
  namespace: observability
  labels:
    app: correlation-engine
    app.kubernetes.io/part-of: spectrum
spec:
  replicas: 2
  selector:
    matchLabels:
      app: correlation-engine
  template:
    metadata:
      labels:
        app: correlation-engine
    spec:
      containers:
        - name: correlation-engine
          image: spectrum/correlation-engine:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8081
          env:
            - name: KAFKA_BROKERS
              value: kafka.observability.svc.cluster.local:9092
            - name: REDIS_ADDR
              value: redis.observability.svc.cluster.local:6379
            - name: CORRELATION_PORT
              value: "8081"
            - name: CORRELATION_WINDOW_SECONDS
              value: "120"
            - name: PROMETHEUS_URL
              value: http://prometheus.observability.svc.cluster.local:9090
            - name: TEMPO_URL
              value: http://tempo.observability.svc.cluster.local:3200
            - name: LOKI_URL
              value: http://loki.observability.svc.cluster.local:3100
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: 1
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /health
              port: 8081
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8081
            initialDelaySeconds: 3
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: correlation-engine
  namespace: observability
spec:
  selector:
    app: correlation-engine
  ports:
    - name: http
      port: 8081
      targetPort: 8081
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: correlation-engine-hpa
  namespace: observability
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: correlation-engine
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
