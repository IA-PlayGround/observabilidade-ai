apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-engine
  namespace: observability
  labels:
    app: ai-engine
    app.kubernetes.io/part-of: spectrum
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ai-engine
  template:
    metadata:
      labels:
        app: ai-engine
    spec:
      containers:
        - name: ai-engine
          image: spectrum/ai-engine:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8082
          env:
            - name: AI_ENGINE_PORT
              value: "8082"
            - name: LLM_BACKEND
              valueFrom:
                configMapKeyRef:
                  name: spectrum-config
                  key: llm_backend
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: spectrum-secrets
                  key: openai_api_key
                  optional: true
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: spectrum-secrets
                  key: anthropic_api_key
                  optional: true
            - name: CORRELATION_URL
              value: http://correlation-engine.observability.svc.cluster.local:8081
            - name: PROMETHEUS_URL
              value: http://prometheus.observability.svc.cluster.local:9090
            - name: TEMPO_URL
              value: http://tempo.observability.svc.cluster.local:3200
            - name: LOKI_URL
              value: http://loki.observability.svc.cluster.local:3100
          resources:
            requests: { cpu: 250m, memory: 256Mi }
            limits: { cpu: 1, memory: 512Mi }
          livenessProbe:
            httpGet:
              path: /health
              port: 8082
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: ai-engine
  namespace: observability
spec:
  selector:
    app: ai-engine
  ports:
    - name: http
      port: 8082
      targetPort: 8082
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: observability
  labels:
    app: api-gateway
    app.kubernetes.io/part-of: spectrum
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
        - name: api-gateway
          image: spectrum/api-gateway:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: API_GATEWAY_PORT
              value: "8080"
            - name: CORRELATION_URL
              value: http://correlation-engine.observability.svc.cluster.local:8081
            - name: AI_ENGINE_URL
              value: http://ai-engine.observability.svc.cluster.local:8082
            - name: GRAFANA_URL
              value: http://grafana.observability.svc.cluster.local:3000
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: spectrum-secrets
                  key: jwt_secret
          resources:
            requests: { cpu: 250m, memory: 256Mi }
            limits: { cpu: 500m, memory: 512Mi }
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: observability
spec:
  type: ClusterIP
  selector:
    app: api-gateway
  ports:
    - name: http
      port: 8080
      targetPort: 8080
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: spectrum-config
  namespace: observability
data:
  llm_backend: "openai"
  environment: "production"
  log_level: "info"
  correlation_window_seconds: "120"
  grafana_dashboard_url: "http://grafana.observability.svc.cluster.local:3000"
---
apiVersion: v1
kind: Secret
metadata:
  name: spectrum-secrets
  namespace: observability
type: Opaque
stringData:
  jwt_secret: "change-me-in-production-use-external-secrets"
  openai_api_key: ""
  anthropic_api_key: ""
